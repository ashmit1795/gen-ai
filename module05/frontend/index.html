<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatDPT</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-neutral-900 text-white overflow-x-hidden">

    <div class="container mx-auto max-w-3xl pb-54 px-2" id="chat-container">
        <!-- Messages go here -->
        <!-- <div class="my-6 bg-neutral-800 p-3 rounded-xl ml-auto max-w-fit">
            Hi, How are you ?
        </div> -->

        <!-- assistant message -->
        <!-- <div class="max-w-fit">
            I'm doing great, thanks for asking!
        </div> -->

        <!-- bottom text area goes here  -->
        <div class="fixed inset-x-0 bottom-0 p-4 flex justify-center items-center bg-neutral-900">
